<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pesanan Saya | Cetak Tinta</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #0b0f19; color: #f3f4f6; overflow-x: hidden; }
        .animated-bg { background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%); position: relative; }
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .blob { position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.3; pointer-events: none; }
        .blob-1 { top: 5%; left: 5%; width: 250px; height: 250px; background: #06b6d4; }
        .blob-2 { bottom: 5%; right: 5%; width: 280px; height: 280px; background: #a855f7; }
    </style>
</head>
<body class="animated-bg min-h-screen flex flex-col justify-between py-6 relative">

    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <!-- Header Navigation -->
    <header class="w-full max-w-4xl mx-auto px-6 flex justify-between items-center mb-8 z-10">
        <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-cyan-500 via-purple-500 to-pink-500 p-0.5 flex items-center justify-center shadow-lg">
                <div class="w-full h-full bg-slate-900 rounded-[10px] flex items-center justify-center">
                    <i class="fa-solid fa-receipt text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-purple-400 text-lg"></i>
                </div>
            </div>
            <div>
                <span class="text-xl font-extrabold tracking-wider bg-clip-text text-transparent bg-gradient-to-r from-white via-slate-200 to-cyan-400">
                    CETAK TINTA
                </span>
                <p class="text-[10px] text-cyan-400 font-semibold tracking-widest uppercase">Sejarah & Status Pesanan</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <a href="dashboard.html" class="px-3 py-2 rounded-xl bg-slate-800/80 hover:bg-slate-700 text-xs font-semibold text-slate-300 border border-white/10 transition flex items-center gap-2">
                <i class="fa-solid fa-house"></i> <span class="hidden sm:inline">Utama</span>
            </a>
        </div>
    </header>

    <!-- Main Container -->
    <main class="w-full max-w-4xl mx-auto px-4 my-auto z-10 flex-grow">
        
        <div class="mb-6">
            <h1 class="text-2xl font-extrabold text-white flex items-center gap-2">
                <i class="fa-solid fa-box-archive text-cyan-400"></i> Pesanan Saya
            </h1>
            <p class="text-xs text-slate-400 mt-1">Pantau status cetakan dokumen anda secara langsung di sini.</p>
        </div>

        <!-- Alert Notification Box -->
        <div id="alert-box" class="hidden p-3.5 rounded-xl mb-4 text-xs font-semibold flex items-center space-x-2"></div>

        <!-- LIST PESANAN PELANGGAN -->
        <div id="pesanan-list-container" class="space-y-4 mb-6">
            <!-- Data dimasukkan secara dinamik melalui skrip JS -->
        </div>

        <!-- State Kosong -->
        <div id="empty-state" class="hidden text-center py-16 glass-card rounded-3xl p-8 max-w-md mx-auto">
            <div class="w-16 h-16 bg-slate-800 text-slate-500 rounded-2xl flex items-center justify-center text-3xl mx-auto mb-4 border border-white/5">
                <i class="fa-solid fa-folder-open"></i>
            </div>
            <h3 class="text-base font-bold text-white mb-1">Tiada Pesanan Jumpa</h3>
            <p class="text-xs text-slate-400 mb-4">Anda belum lagi membuat sebarang tempahan cetakan dokumen.</p>
            <a href="buat-pesanan.html" class="inline-block px-4 py-2.5 rounded-xl bg-gradient-to-r from-cyan-500 to-blue-600 text-white text-xs font-bold shadow-lg hover:opacity-90 transition">
                <i class="fa-solid fa-plus mr-1"></i> Buat Pesanan Baru
            </a>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-6 text-center text-slate-500 text-xs z-10">
        &copy; 2026 Cetak Tinta System. Hak Cipta Terpelihara.
    </footer>

    <!-- Firebase SDK & Logik Pelanggan -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, query, where, onSnapshot, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBKemZYeMNfwOZlX9MYf8iqJVtyoCEixmo",
            authDomain: "cetaktinta-bb755.firebaseapp.com",
            projectId: "cetaktinta-bb755",
            storageBucket: "cetaktinta-bb755.firebasestorage.app",
            messagingSenderId: "439592324038",
            appId: "1:439592324038:web:4ab89ce9706447809240c7",
            measurementId: "G-X9ZEL7PEJV"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const pesananListContainer = document.getElementById('pesanan-list-container');
        const emptyState = document.getElementById('empty-state');

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "login.html"; 
            } else {
                loadUserOrders(user.uid);
            }
        });

        function showAlert(message, type = 'success') {
            const alertBox = document.getElementById('alert-box');
            alertBox.classList.remove('hidden', 'bg-red-500/20', 'border-red-500/50', 'text-red-300', 'bg-green-500/20', 'border-green-500/50', 'text-green-300');
            
            if (type === 'error') {
                alertBox.classList.add('bg-red-500/20', 'border', 'border-red-500/50', 'text-red-300');
                alertBox.innerHTML = `<i class="fa-solid fa-circle-exclamation"></i> <span>${message}</span>`;
            } else {
                alertBox.classList.add('bg-green-500/20', 'border', 'border-green-500/50', 'text-green-300');
                alertBox.innerHTML = `<i class="fa-solid fa-circle-check"></i> <span>${message}</span>`;
            }
            setTimeout(() => alertBox.classList.add('hidden'), 4000);
        }

        function loadUserOrders(userId) {
            try {
                const q = query(collection(db, "orders"), where("userId", "==", userId));

                onSnapshot(q, (snapshot) => {
                    pesananListContainer.innerHTML = "";
                    let orders = [];

                    snapshot.forEach((docSnap) => {
                        orders.push({ id: docSnap.id, ...docSnap.data() });
                    });

                    if (orders.length === 0) {
                        emptyState.classList.remove('hidden');
                        return;
                    }

                    emptyState.classList.add('hidden');

                    orders.forEach((order) => {
                        let dateFormatted = 'Baru sahaja';
                        if (order.createdAt && order.createdAt.seconds) {
                            dateFormatted = new Date(order.createdAt.seconds * 1000).toLocaleString('ms-MY', { 
                                dateStyle: 'medium', 
                                timeStyle: 'short' 
                            });
                        }

                        let rawStatus = order.status ? order.status.trim() : "Pending";
                        let statusBadge = "";
                        let canCancel = false;

                        if (rawStatus === "Pending" || rawStatus === "Pesanan Masuk") {
                            statusBadge = `<span class="px-2.5 py-1 rounded-full text-[10px] font-bold bg-cyan-500/20 text-cyan-300 border border-cyan-500/30">Belum Diproses</span>`;
                            canCancel = true; 
                        } else if (rawStatus === "Proses" || rawStatus === "Dalam Proses" || rawStatus === "Processing") {
                            statusBadge = `<span class="px-2.5 py-1 rounded-full text-[10px] font-bold bg-yellow-500/20 text-yellow-300 border border-yellow-500/30"><i class="fa-solid fa-print animate-pulse mr-1"></i> Sedang Diproses (Tengah Print)</span>`;
                        } else if (rawStatus === "Penghantaran" || rawStatus === "Delivering" || rawStatus === "Ready") {
                            statusBadge = `<span class="px-2.5 py-1 rounded-full text-[10px] font-bold bg-purple-500/20 text-purple-300 border border-purple-500/30"><i class="fa-solid fa-truck-fast mr-1"></i> Dalam Penghantaran</span>`;
                        } else if (rawStatus === "Selesai" || rawStatus === "Completed") {
                            statusBadge = `<span class="px-2.5 py-1 rounded-full text-[10px] font-bold bg-emerald-500/20 text-emerald-300 border border-emerald-500/30"><i class="fa-solid fa-check-circle mr-1"></i> Selesai</span>`;
                        } else {
                            statusBadge = `<span class="px-2.5 py-1 rounded-full text-[10px] font-bold bg-slate-500/20 text-slate-300 border border-slate-500/30">${rawStatus}</span>`;
                        }

                        const itemDiv = document.createElement('div');
                        itemDiv.className = "glass-card rounded-2xl p-5 border border-white/10 shadow-lg space-y-4";

                        itemDiv.innerHTML = `
                            <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-2 pb-3 border-b border-white/10">
                                <div>
                                    <span class="text-[10px] text-slate-400 font-semibold">ID Pesanan: #${order.id.slice(0, 8).toUpperCase()}</span>
                                    <p class="text-[11px] text-slate-400"><i class="fa-regular fa-calendar mr-1"></i> ${dateFormatted}</p>
                                </div>
                                <div>
                                    ${statusBadge}
                                </div>
                            </div>

                            <div class="grid grid-cols-1 sm:grid-cols-2 gap-3 text-xs">
                                <div>
                                    <p class="text-slate-400">Penerima:</p>
                                    <p class="font-bold text-white">${order.recipientName || '-'}</p>
                                </div>
                                <div>
                                    <p class="text-slate-400">No. Telefon:</p>
                                    <p class="font-semibold text-white">${order.recipientPhone || '-'}</p>
                                </div>
                                <div>
                                    <p class="text-slate-400">Jenis Cetakan:</p>
                                    <p class="font-semibold text-slate-200">${order.printColor || '-'} &bull; ${order.printSides || '-'}</p>
                                </div>
                                <div>
                                    <p class="text-slate-400">Jumlah Muka Surat & Salinan:</p>
                                    <p class="font-semibold text-slate-200">${order.pageCount || 1} M/S &bull; ${order.quantity || 1} Copy</p>
                                </div>
                            </div>

                            <div class="pt-3 border-t border-white/10 flex flex-col sm:flex-row items-center justify-between gap-3">
                                <div>
                                    <span class="text-[11px] text-slate-400">Jumlah Bayaran:</span>
                                    <span class="text-sm font-extrabold text-emerald-400 ml-1">RM ${order.totalPrice ? Number(order.totalPrice).toFixed(2) : '0.00'}</span>
                                </div>

                                <div class="flex items-center gap-2 w-full sm:w-auto justify-end">
                                    ${order.fileUrl ? `<a href="${order.fileUrl}" target="_blank" class="px-3 py-2 rounded-xl bg-slate-800 hover:bg-slate-700 text-cyan-300 border border-cyan-500/20 text-xs font-semibold transition flex items-center gap-1.5"><i class="fa-solid fa-file-pdf"></i> Lihat Fail</a>` : ''}
                                    
                                    ${canCancel ? `<button onclick="cancelOrder('${order.id}')" class="px-3 py-2 rounded-xl bg-red-500/20 hover:bg-red-500/30 text-red-300 border border-red-500/30 text-xs font-bold transition flex items-center gap-1.5"><i class="fa-solid fa-ban"></i> Batalkan Pesanan</button>` : ''}
                                </div>
                            </div>
                        `;
                        pesananListContainer.appendChild(itemDiv);
                    });
                }, (error) => {
                    console.error("Ralat memuatkan pesanan:", error);
                    showAlert("Ralat memuatkan data pesanan anda.", "error");
                });

            } catch (err) {
                console.error("Ralat sistem:", err);
            }
        }

        window.cancelOrder = async function(orderId) {
            if (!confirm("Adakah anda pasti mahu membatalkan pesanan ini?")) return;
            try {
                await deleteDoc(doc(db, "orders", orderId));
                showAlert("Pesanan anda telah berjaya dibatalkan.", "success");
            } catch (error) {
                console.error("Ralat membatalkan pesanan:", error);
                showAlert("Gagal membatalkan pesanan: " + error.message, "error");
            }
        }
    </script>
</body>
</html>
